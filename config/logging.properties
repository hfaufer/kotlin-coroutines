################################################################################
# Logging Configuration File
#
# You must specify the filename with the property
#   "java.util.logging.config.file system"
# For example, relative to the application's working directory:
#   -Djava.util.logging.config.file="config/logging.properties"
################################################################################
################################################################################
#  	Global properties
################################################################################
# "handlers" specifies a comma separated list of log Handler classes. These
# handlers will be installed during VM startup. Note that these classes must be
# on the system classpath. By default, we only configure a ConsoleHandler,
# which will only show messages at the INFO and above levels.
handlers=java.util.logging.ConsoleHandler
################################################################################
# Handler specific properties describe specific configuration info for Handlers.
################################################################################
# Limit the message that are printed on the console to FINE and above.
java.util.logging.ConsoleHandler.level=FINE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
################################################################################
# Facility specific properties.
# Provides extra control for each logger.
################################################################################
de.hu.level=FINE
